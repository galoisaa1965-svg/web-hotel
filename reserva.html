<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservar - Hotel Marsol</title>
  <link rel="icon" href="media/img.logo.jpeg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

  <link rel="stylesheet" href="index.css" />
  <script src="index.js" defer></script>
</head>

<body>
  <header class="site-header">
    <div class="container header-content">
      <a href="index.html" class="logo" aria-label="Ir al inicio">
        <img src="media/img.logo.jpeg" alt="Logo de Hotel Marsol" />
      </a>

      <button class="menu-toggle" type="button" aria-label="Abrir menú" aria-expanded="false">
        <i class="bi bi-list"></i>
      </button>

      <nav class="main-nav">
        <a href="index.html#hero">Inicio</a>
        <a href="index.html#nosotros">Nosotros</a>
        <a href="index.html#habitaciones">Habitaciones</a>
        <a href="index.html#contacto">Contacto</a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <section class="reservation-section">
      <div class="reservation-card">
        <span class="section-label">Reserva</span>
        <h1>Formulario de reservación</h1>

        <form id="reservation-form">
          <div class="form-group">
            <label for="name">Nombre completo</label>
            <input type="text" id="name" name="name" placeholder="Tu nombre" required />
          </div>

          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required />
          </div>

          <div class="form-group">
            <label for="phone">Teléfono o WhatsApp</label>
            <input type="tel" id="phone" name="phone" placeholder="+504 9xxx xxxx" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="checkin">Fecha de entrada</label>
              <input type="date" id="checkin" name="checkin" required />
            </div>

            <div class="form-group">
              <label for="checkout">Fecha de salida</label>
              <input type="date" id="checkout" name="checkout" required />
            </div>
          </div>

          <div class="form-group">
            <label for="room">Tipo de habitación</label>
            <select id="room" name="room" required>
              <option value="" disabled selected>Selecciona una opción</option>
              <option value="Habitación Vista al Mar">Habitación Vista al Mar</option>
              <option value="Suite Familiar">Suite Familiar</option>
              <option value="Habitación Doble">Habitación Doble</option>
              <option value="Habitación Económica">Habitación Económica</option>
              <option value="Habitación Familiar">Habitación Familiar</option>
            </select>
          </div>

          <div class="form-group">
            <label for="guests">Número de personas</label>
            <select id="guests" name="guests" required>
              <option value="" disabled selected>Selecciona</option>
              <option value="1">1 persona</option>
              <option value="2">2 personas</option>
              <option value="3">3 personas</option>
              <option value="4">4 personas</option>
              <option value="5 o más">5 o más</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Comentarios adicionales</label>
            <textarea id="message" name="message" placeholder="Escribe aquí cualquier detalle o pregunta"></textarea>
          </div>

          <button type="submit" class="btn btn-primary form-button">Enviar solicitud por WhatsApp</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p><i class="bi bi-whatsapp"></i> +504 9778-1626</p>
      <p>© 2026 Hotel Marsol - Tela, Honduras</p>
    </div>
  </footer>
</body>
</html>
